<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Cartão de Visitas</title>
    <style>
        /* Reset de estilos básicos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* Container do Cartão */
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Banner superior */
        .banner {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            height: 120px;
        }

        /* Foto de perfil (usando iniciais como exemplo) */
        .avatar {
            width: 90px;
            height: 90px;
            background: #2b2d42;
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 4px solid white;
            margin: -45px auto 15px auto;
        }

        /* Conteúdo de texto */
        .content {
            padding: 20px;
        }

        .name {
            font-size: 22px;
            color: #2b2d42;
            margin-bottom: 5px;
        }

        .title {
            font-size: 14px;
            color: #8d99ae;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
